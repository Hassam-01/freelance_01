<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPT Theme Editor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/src/styles/main.css">
</head>
<body>
    <div id="app">
        <!-- Main Application Container -->
        <div class="container-fluid h-100">
            <div class="row h-100">
                <!-- Main Content -->
                <div class="col-12">
                    <div class="d-flex flex-column h-100">
                        <!-- Header -->
                        <header class="bg-white border-bottom p-3">
                            <div class="d-flex justify-content-between align-items-center">
                                <h1 class="h4 mb-0">
                                    <i class="bi bi-easel me-2"></i>
                                    PPT Theme Editor
                                </h1>
                                <button id="openEditorBtn" class="btn btn-primary">
                                    <i class="bi bi-gear me-2"></i>
                                    Open Editor
                                </button>
                            </div>
                        </header>

                        <!-- Main Content Area -->
                        <main class="flex-grow-1 p-4">
                            <div class="text-center">
                                <div class="mb-4">
                                    <i class="bi bi-easel display-1 text-muted"></i>
                                </div>
                                <h2>Welcome to PPT Theme Editor</h2>
                                <p class="text-muted">Create and customize presentation themes with charts and styling options.</p>
                                <button id="getStartedBtn" class="btn btn-primary btn-lg">
                                    <i class="bi bi-play-circle me-2"></i>
                                    Get Started
                                </button>
                            </div>
                        </main>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- PPT Editor Modal -->
    <div class="modal fade" id="pptEditorModal" tabindex="-1" aria-labelledby="pptEditorModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-fullscreen">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="pptEditorModalLabel">
                        <i class="bi bi-gear me-2"></i>
                        Presentation Editor
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-0">
                    <div id="pptEditorContainer"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" id="saveSettingsBtn" class="btn btn-primary">
                        <i class="bi bi-save me-2"></i>
                        Save Settings
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Chart Modal -->
    <div class="modal fade" id="chartModal" tabindex="-1" aria-labelledby="chartModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="chartModalLabel">
                        <i class="bi bi-bar-chart me-2"></i>
                        Choose Chart Type
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="chartOptionsContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Theme Color Picker Modal -->
    <div class="modal fade" id="themeColorModal" tabindex="-1" aria-labelledby="themeColorModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="themeColorModalLabel">
                        <i class="bi bi-palette me-2"></i>
                        Theme Color Editor
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="themeColorContainer"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" id="saveThemeBtn" class="btn btn-primary">
                        <i class="bi bi-save me-2"></i>
                        Save Theme
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Slide Settings Modal -->
    <div class="modal fade" id="slideSettingsModal" tabindex="-1" aria-labelledby="slideSettingsModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="slideSettingsModalLabel">
                        <i class="bi bi-sliders me-2"></i>
                        Slide Settings
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-0">
                    <div id="slideSettingsContainer"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" id="saveSlideSettingsBtn" class="btn btn-primary">
                        <i class="bi bi-save me-2"></i>
                        Save Settings
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Recharts for charts -->
    <script src="https://unpkg.com/recharts@2.15.2/umd/Recharts.js"></script>
    <!-- Main Application Script -->
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
